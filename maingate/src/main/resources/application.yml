server:
  port: 8000
  tomcat:
    uri-encoding: UTF-8
    threads:
      max: 300              # 최대 스레드 수 (동시 요청 처리)
      min-spare: 20         # 최소 유지 스레드 수
    connection-timeout: 30000 # 연결 타임아웃 (30초)
    accept-count: 150       # 대기 큐 크기
    max-connections: 500    # 최대 연결 수
spring:
  mvc:
    static-path-pattern: /static/**
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://kcfinder.cf6og1l7mjlg.ap-northeast-2.rds.amazonaws.com:3306/pnugateway
    password: "zz0103300!!"
    username: admin
    hikari:
      maximum-pool-size: 30           # 최대 DB 커넥션 수
      minimum-idle: 10                # 최소 유지 커넥션 수
      pool-name: HikariCP-ERP        # 커넥션 풀 이름
  task:
    scheduling:
      pool:
        size: 5          # 스케줄러 스레드 풀 크기
  transaction:
    default-timeout: 7200  # 2시간 (하이픈 API 대응)
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect
  web:
    resources:
      static-locations: classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/

# JWT 설정
jwt:
  secret-key: my-super-secret-key-for-saejeonggate-project-must-be-at-least-256-bits-long-for-hs256-algorithm
  access-token-expire: 3600000      # 1시간 (밀리초)
  refresh-token-expire: 604800000   # 7일 (밀리초)

platform:
  sync:
    delay:
      enabled: true      # 지연 처리 활성화
      seconds: 120       # 개발환경: 2분 간격 // 운영시 10으로 수정

management:
  security:
    enabled: false

mybatis:
  mapper-locations:
  - /mappers/*/*.xml

# ===================================
# 비동기 처리 설정
# ===================================
async:
  thread-pool:
    core-size: 10                    # 코어 스레드 수
    max-size: 50                     # 최대 스레드 수
    queue-capacity: 100              # 큐 용량
    thread-name-prefix: "Async-"     # 스레드 이름 접두사